<!-- templates/jobs/job_confirm_delete.html -->
{% extends 'base.html' %}
{% block title %}Delete Job{% endblock %}

{% block content %}
<div style="max-width:500px; margin:50px auto; background:white;
            padding:30px; border-radius:8px; text-align:center;">

    <h2 style="color:red; margin-bottom:15px;">⚠️ Confirm Delete</h2>
    <p style="margin-bottom:20px;">
        Kya tu sach mein <strong>{{ job.role }} at {{ job.company }}</strong>
        delete karna chahta hai?
    </p>

    <form method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit"
                style="padding:10px 25px; background:red;
                       color:white; border:none; border-radius:4px; cursor:pointer;">
            Haan, Delete Karo
        </button>
    </form>

    <a href="{% url 'dashboard' %}"
       style="display:inline-block; margin-left:15px; padding:10px 25px;
              background:#666; color:white; border-radius:4px; text-decoration:none;">
        Cancel
    </a>
</div>
{% endblock %}
