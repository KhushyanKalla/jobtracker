<!-- templates/jobs/job_form.html -->
{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div style="max-width:600px; margin:0 auto; background:white;
            padding:30px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1)">

    <h2 style="margin-bottom:20px; color:#1B3A6B;">{{ title }}</h2>

    <form method="post">
        {% csrf_token %}

        {% for field in form %}
        <div style="margin-bottom:20px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">
                {{ field.label }}
            </label>
            {{ field }}
            {% if field.errors %}
                <div style="color:red; font-size:12px; margin-top:5px;">
                    {{ field.errors }}
                </div>
            {% endif %}
        </div>
        {% endfor %}

        <div style="display:flex; gap:10px;">
            <button type="submit"
                    style="padding:12px 30px; background:#1B3A6B;
                           color:white; border:none; border-radius:4px; cursor:pointer;">
                Save
            </button>
            <a href="{% url 'dashboard' %}"
               style="padding:12px 30px; background:#666;
                      color:white; border-radius:4px; text-decoration:none;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
