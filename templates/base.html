<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JobTracker{% endblock %}</title>
    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        nav {
            background: #1B3A6B; color: white;
            padding: 15px 30px;
            display: flex; justify-content: space-between;
        }
        nav a { color: white; text-decoration: none; margin-left: 20px; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .messages { padding: 10px; margin-bottom: 20px; }
        .messages .success { background: #d4edda; padding: 10px; border-radius: 4px; }
        .messages .error { background: #f8d7da; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <nav>
        <span>🎯 JobTracker</span>
        <div>
            {% if user.is_authenticated %}
                <span>Hello, {{ user.username }}!</span>
                <form method="post" action="{% url 'logout' %}" style="display:inline">
                    {% csrf_token %}
                    <button type="submit"
                        style="background:none;border:none;color:white;cursor:pointer;">
                        Logout
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">

        <!-- Flash messages -->
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Har child page ka content yahan aayega -->
        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
