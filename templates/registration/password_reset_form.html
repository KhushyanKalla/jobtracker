<!-- templates/registration/password_reset_form.html -->
{% extends 'base.html' %}
{% block title %}Password Reset{% endblock %}

{% block content %}
<div style="max-width:400px; margin:50px auto; background:white;
            padding:30px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1)">

    <h2 style="margin-bottom:15px; color:#1B3A6B;">Password Reset</h2>
    <p style="margin-bottom:20px; color:#666;">
        Apna email daalo — reset link bhejenge.
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit"
                style="width:100%; padding:12px; background:#1B3A6B;
                       color:white; border:none; border-radius:4px; cursor:pointer;">
            Reset Link Bhejo
        </button>
    </form>
</div>
{% endblock %}
